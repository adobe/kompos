<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320"
     font-family="ui-sans-serif, system-ui, sans-serif">

  <style>
    /* Light mode */
    .bg        { fill: #f8fafc; }
    .box-blue  { fill: #eff6ff; stroke: #3b82f6; }
    .box-purple{ fill: #faf5ff; stroke: #7c3aed; }
    .box-orange{ fill: #fff7ed; stroke: #f97316; }
    .box-green { fill: #f0fdf4; stroke: #16a34a; }
    .box-sm-o  { fill: #fff7ed; stroke: #f97316; }
    .box-sm-g  { fill: #f0fdf4; stroke: #16a34a; }
    .dot-blue  { fill: #3b82f6; }
    .dot-purple{ fill: #7c3aed; }
    .dot-gray  { fill: #64748b; }
    .t-blue    { fill: #1d4ed8; }
    .t-blue2   { fill: #3b82f6; }
    .t-purple  { fill: #6d28d9; }
    .t-purple2 { fill: #7c3aed; }
    .t-orange  { fill: #c2410c; }
    .t-orange2 { fill: #ea580c; }
    .t-green   { fill: #15803d; }
    .t-green2  { fill: #16a34a; }
    .t-gray    { fill: #64748b; }
    .t-light   { fill: #9ca3af; }
    .t-white   { fill: #ffffff; }
    .arr       { stroke: #94a3b8; }
    .div-line  { stroke: #e9d5ff; }

    /* Dark mode overrides */
    @media (prefers-color-scheme: dark) {
      .bg        { fill: #0f172a; }
      .box-blue  { fill: #1e2d47; stroke: #60a5fa; }
      .box-purple{ fill: #1e1a33; stroke: #a78bfa; }
      .box-orange{ fill: #271a0e; stroke: #fb923c; }
      .box-green { fill: #0d2318; stroke: #4ade80; }
      .box-sm-o  { fill: #271a0e; stroke: #fb923c; }
      .box-sm-g  { fill: #0d2318; stroke: #4ade80; }
      .dot-blue  { fill: #60a5fa; }
      .dot-purple{ fill: #a78bfa; }
      .dot-gray  { fill: #94a3b8; }
      .t-blue    { fill: #93c5fd; }
      .t-blue2   { fill: #60a5fa; }
      .t-purple  { fill: #c4b5fd; }
      .t-purple2 { fill: #a78bfa; }
      .t-orange  { fill: #fdba74; }
      .t-orange2 { fill: #fb923c; }
      .t-green   { fill: #86efac; }
      .t-green2  { fill: #4ade80; }
      .t-gray    { fill: #94a3b8; }
      .t-light   { fill: #64748b; }
      .t-white   { fill: #0f172a; }
      .arr       { stroke: #475569; }
      .div-line  { stroke: #3b2f5e; }
    }
  </style>

  <!-- Background -->
  <rect width="760" height="320" rx="12" class="bg"/>

  <!-- Step labels -->
  <text x="105" y="40" text-anchor="middle" font-size="11" class="t-gray">① Edit YAML</text>
  <text x="330" y="40" text-anchor="middle" font-size="11" class="t-gray">② kompos generates</text>
  <text x="555" y="40" text-anchor="middle" font-size="11" class="t-gray">③ Commit artifacts</text>
  <text x="724" y="40" text-anchor="middle" font-size="11" class="t-gray">④ Deploy</text>

  <!-- Box 1: Config hierarchy -->
  <rect x="30" y="110" width="150" height="100" rx="8" stroke-width="2" class="box-blue"/>
  <text x="105" y="145" text-anchor="middle" font-size="13" font-weight="600" class="t-blue">YAML Config</text>
  <text x="105" y="165" text-anchor="middle" font-size="11" class="t-blue2">Layered hierarchy</text>
  <text x="105" y="182" text-anchor="middle" font-size="11" class="t-blue2">cloud / env / region</text>
  <text x="105" y="199" text-anchor="middle" font-size="11" class="t-blue2">/ cluster</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="160" x2="248" y2="160" stroke-width="2" class="arr" marker-end="url(#a)"/>

  <!-- Box 2: Kompos -->
  <rect x="250" y="80" width="160" height="160" rx="8" stroke-width="2.5" class="box-purple"/>
  <text x="330" y="112" text-anchor="middle" font-size="15" font-weight="700" class="t-purple">kompos</text>
  <text x="330" y="132" text-anchor="middle" font-size="10" class="t-purple2">merge + interpolate</text>
  <line x1="270" y1="141" x2="390" y2="141" stroke-width="1" class="div-line"/>
  <text x="330" y="160" text-anchor="middle" font-size="11" class="t-purple">tfe generate</text>
  <text x="330" y="178" text-anchor="middle" font-size="11" class="t-green">helm generate</text>
  <text x="330" y="196" text-anchor="middle" font-size="11" class="t-purple">config / explore</text>
  <text x="330" y="218" text-anchor="middle" font-size="10" class="t-light">&#123;&#123;key.path&#125;&#125; → values</text>

  <!-- Arrows 2→3 -->
  <line x1="410" y1="120" x2="478" y2="100" stroke-width="2" class="arr" marker-end="url(#a)"/>
  <line x1="410" y1="200" x2="478" y2="220" stroke-width="2" class="arr" marker-end="url(#a)"/>

  <!-- Box 3a: tfvars -->
  <rect x="480" y="50" width="150" height="90" rx="8" stroke-width="2" class="box-orange"/>
  <text x="555" y="78" text-anchor="middle" font-size="12" font-weight="600" class="t-orange">tfvars + workspaces</text>
  <text x="555" y="97"  text-anchor="middle" font-size="10" class="t-orange2">committed to git</text>
  <text x="555" y="114" text-anchor="middle" font-size="10" class="t-orange2">consumed by TFE</text>
  <text x="555" y="131" text-anchor="middle" font-size="10" class="t-orange2">→ provisions infra</text>

  <!-- Box 3b: argoapps -->
  <rect x="480" y="175" width="150" height="90" rx="8" stroke-width="2" class="box-green"/>
  <text x="555" y="203" text-anchor="middle" font-size="12" font-weight="600" class="t-green">argoapps/*.yaml</text>
  <text x="555" y="222" text-anchor="middle" font-size="10" class="t-green2">committed to git</text>
  <text x="555" y="239" text-anchor="middle" font-size="10" class="t-green2">consumed by ArgoCD</text>
  <text x="555" y="256" text-anchor="middle" font-size="10" class="t-green2">→ deploys to cluster</text>

  <!-- Arrows 3→4 -->
  <line x1="630" y1="95"  x2="698" y2="95"  stroke-width="2" class="arr" marker-end="url(#a)"/>
  <line x1="630" y1="220" x2="698" y2="220" stroke-width="2" class="arr" marker-end="url(#a)"/>

  <!-- Box 4a: TFE -->
  <rect x="700" y="62" width="48" height="64" rx="6" stroke-width="1.5" class="box-sm-o"/>
  <text x="724" y="88"  text-anchor="middle" font-size="9" font-weight="600" class="t-orange">Terra</text>
  <text x="724" y="101" text-anchor="middle" font-size="9" font-weight="600" class="t-orange">form</text>
  <text x="724" y="117" text-anchor="middle" font-size="8" class="t-orange2">TFE</text>

  <!-- Box 4b: ArgoCD -->
  <rect x="700" y="187" width="48" height="64" rx="6" stroke-width="1.5" class="box-sm-g"/>
  <text x="724" y="213" text-anchor="middle" font-size="9" font-weight="600" class="t-green">Argo</text>
  <text x="724" y="226" text-anchor="middle" font-size="9" font-weight="600" class="t-green">CD</text>
  <text x="724" y="242" text-anchor="middle" font-size="8" class="t-green2">Helm</text>

  <!-- Step number dots -->
  <circle cx="105" cy="270" r="12" class="dot-blue"/>
  <text x="105" y="275" text-anchor="middle" font-size="11" font-weight="bold" class="t-white">1</text>
  <circle cx="330" cy="270" r="12" class="dot-purple"/>
  <text x="330" y="275" text-anchor="middle" font-size="11" font-weight="bold" class="t-white">2</text>
  <circle cx="555" cy="270" r="12" class="dot-gray"/>
  <text x="555" y="275" text-anchor="middle" font-size="11" font-weight="bold" class="t-white">3</text>
  <circle cx="724" cy="270" r="12" class="dot-gray"/>
  <text x="724" y="275" text-anchor="middle" font-size="11" font-weight="bold" class="t-white">4</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

</svg>
