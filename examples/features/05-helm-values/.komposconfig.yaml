---
komposconfig:
  # Required by schema (not used by the helm runner)
  terraform: {}
  compositions:
    system_keys:
      tfe: [workspace, composition, tfe, __helm_values__]

  helm:
    config:
      enclosing_key:    "__helm_values__"
      tfe_outputs_path: "outputs/tfe-outputs.yaml"
      output_subdir:    "argoapps"
      base_output_dir:  "./generated"
      charts_dir:       "./values"
      # Bridge template filename within each chart dir (contains {{ }} placeholders)
      bridge_filename:  "bridge.yaml"
      # When true, after rendering the bridge template, also load and merge
      # overrides/{env}.yaml and overrides/{cluster}.yaml on top (plain YAML, no {{ }}).
      # Merge order: bridge (base) <- env override <- cluster override (wins).
      overrides_merge:  true
